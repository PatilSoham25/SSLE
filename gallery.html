<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - SSLE</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/gallery.css">
    <link rel="icon" href="assets/img/SSLE_company_logo.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="header"></div>
    <!-- ================= GALLERY SECTION ================= -->

    <section class="gallery-section">

        <div class="container">

            <!-- SECTION TITLE -->

            <div class="gallery-title">

                <span class="section-tag">
                    OUR GALLERY
                </span>

                <h2>
                    Industrial Manufacturing & Engineering Work
                </h2>

                <p>
                    Explore our precision machining, fabrication,
                    pulley manufacturing, crane wheel solutions,
                    gears, and industrial engineering projects.
                </p>

            </div>

            <!-- ================= FABRICATION ================= -->

            <div class="gallery-category">

                <div class="category-header">

                    <h3>
                        Fabrication
                    </h3>

                </div>

                <div class="gallery-grid fabrication-grid">

                    <div class="gallery-item">
                        <img src="/assets/img/gallery/fabrication-1.jfif"
                            alt="Fabrication Work">
                    </div>

                    <div class="gallery-item">
                        <img src="/assets/img/gallery/fabrication-2.jfif"
                            alt="Fabrication Work">
                    </div>

                    <div class="gallery-item">
                        <img src="/assets/img/gallery/fabrication-3.jfif"
                            alt="Fabrication Work">
                    </div>

                    <div class="gallery-item">
                        <img src="/assets/img/gallery/fabrication-4.jpeg"
                            alt="Fabrication Work">
                    </div>

                    <div class="gallery-item">
                        <img src="/assets/img/gallery/fabrication-5.jpeg"
                            alt="Fabrication Work">
                    </div>

                    <div class="gallery-item">
                        <img src="/assets/img/gallery/fabrication-6.jpeg"
                            alt="Fabrication Work">
                    </div>

                </div>

            </div>

            <!-- ================= SHEAVE PULLEY ================= -->

            <div class="gallery-category">

                <div class="category-header">

                    <h3>
                        Sheave Pulley & Crane Wheels
                    </h3>

                </div>

                <div class="gallery-grid small-grid">

                    <div class="gallery-item">
                        <img src="/assets/img/gallery/pulley.jpeg"
                            alt="Pulley">
                    </div>

                    <div class="gallery-item">
                        <img src="/assets/img/gallery/crane-wheels.jfif"
                            alt="Crane Wheel">
                    </div>

                    <div class="gallery-item">
                        <img src="/assets/img/gallery/sheave-pully.jpeg"
                            alt="Sheave Pulley">
                    </div>

                </div>

            </div>

            <!-- ================= GEAR ================= -->

            <div class="gallery-category">

                <div class="category-header">

                    <h3>
                        Gear & Gear Box
                    </h3>

                </div>

                <div class="gallery-grid small-grid">

                    <div class="gallery-item">
                        <img src="/assets/img/gallery/gear.jfif"
                            alt="Gear">
                    </div>

                    <div class="gallery-item">
                        <img src="/assets/img/gallery/gear-box.jfif"
                            alt="Gear Box">
                    </div>

                    <div class="gallery-item">
                        <img src="/assets/img/gallery/industrial-gear.jfif"
                            alt="Industrial Gear">
                    </div>

                </div>

            </div>

            <!-- ================= VIDEOS SECTION ================= -->

            <div class="gallery-category">

                <div class="category-header">

                    <h3>
                        Industrial Videos
                    </h3>

                </div>

                <div class="video-grid">

                    <div class="video-item">
                        <video controls>
                            <source src="/assets/videos/video-1.mp4" type="video/mp4">
                        </video>
                    </div>

                    <div class="video-item">
                        <video controls>
                            <source src="/assets/videos/video-2.mp4" type="video/mp4">
                        </video>
                    </div>

                    <div class="video-item">
                        <video controls>
                            <source src="/assets/videos/video-3.mp4" type="video/mp4">
                        </video>
                    </div>

                    <div class="video-item">
                        <video controls>
                            <source src="/assets/videos/video-4.mp4" type="video/mp4">
                        </video>
                    </div>

                    <div class="video-item">
                        <video controls>
                            <source src="/assets/videos/video-5.mp4" type="video/mp4">
                        </video>
                    </div>

                    <div class="video-item">
                        <video controls>
                            <source src="/assets/videos/video-6.mp4" type="video/mp4">
                        </video>
                    </div>

                    <div class="video-item">
                        <video controls>
                            <source src="/assets/videos/video-7.mp4" type="video/mp4">
                        </video>
                    </div>

                    <div class="video-item">
                        <video controls>
                            <source src="/assets/videos/video-8.mp4" type="video/mp4">
                        </video>
                    </div>

                    <div class="video-item">
                        <video controls>
                            <source src="/assets/videos/video-9.mp4" type="video/mp4">
                        </video>
                    </div>

                    <div class="video-item">
                        <video controls>
                            <source src="/assets/videos/video-10.mp4" type="video/mp4">
                        </video>
                    </div>

                    <div class="video-item">
                        <video controls>
                            <source src="/assets/videos/video-11.mp4" type="video/mp4">
                        </video>
                    </div>

                </div>

            </div>

        </div>

    </section>

    <div id="footer"></div>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/gallery.js"></script>
</body>
</html>
